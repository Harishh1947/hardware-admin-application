
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.field {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

input {
  border: none;
  outline: none;
  width: 80%;
  font-size: 16px;
}

.edit-btn {
  cursor: pointer;
  font-size: 18px;
}

button {
  padding: 12px;
  width: 100%;
  background: #2c3e50;
  color: white;
  border: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Edit Product</h2>

<div id="form"></div>

<button onclick="update()">Commit Changes</button>

</div>

<script>

let productId;
let dataObj = {};

async function load() {
  const params = new URLSearchParams(window.location.search);
  productId = params.get("id");

  let res = await fetch("/products");
  let data = await res.json();

  dataObj = data.find(d => d.id == productId);

  render();
}

function render() {
  form.innerHTML = "";

  for (let key in dataObj) {
    if (key === "id") continue;

    form.innerHTML += `
      <div class="field">
        <input id="${key}" value="${dataObj[key] || ""}" disabled>
        <span class="edit-btn" onclick="enable('${key}')">✏️</span>
      </div>
    `;
  }
}

function enable(id) {
  document.getElementById(id).disabled = false;
  document.getElementById(id).focus();
}

async function update() {
  let updated = {};

  for (let key in dataObj) {
    if (key === "id") continue;
    updated[key] = document.getElementById(key).value;
  }

  await fetch("/update/" + productId, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(updated)
  });

  alert("Updated!");
  window.location.href = "/";
}

load();

</script>

</body>
</html>
