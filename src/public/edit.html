<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Product</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3f8;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #1e3a5f;
      margin-top: 0;
    }

    .field {
      margin-bottom: 16px;
    }

    .field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    label {
      font-weight: bold;
      color: #334155;
    }

    .edit-icon {
      cursor: pointer;
      font-size: 18px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      background: #f8fafc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1e3a5f;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #274b79;
    }

    .top-actions {
      margin-bottom: 16px;
    }

    .back-btn {
      background: #0f766e;
    }

    .back-btn:hover {
      background: #115e59;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-actions">
      <button class="back-btn" onclick="window.location.href='records.html'">Back to Records</button>
    </div>

    <div class="card">
      <h1>Edit Product</h1>
      <div id="form"></div>
      <button onclick="updateRecord()">Commit Changes</button>
    </div>
  </div>

  <script>
    let productId;
    let dataObj = {};

    async function load() {
      const params = new URLSearchParams(window.location.search);
      productId = params.get("id");

      const res = await fetch("/products");
      const data = await res.json();
      dataObj = data.find((d) => d.id == productId);

      if (!dataObj) {
        document.getElementById("form").innerHTML = "<p>Record not found.</p>";
        return;
      }

      render();
    }

    function render() {
      form.innerHTML = `
        ${createSelectField("Product Type", "product_type", dataObj.product_type)}
        ${createInputField("Product Number", "product_number", dataObj.product_number, "text")}
        ${createInputField("Model Number", "model_number", dataObj.model_number, "text")}
        ${createInputField("Serial Number", "serial_number", dataObj.serial_number, "text")}
        ${createInputField("Date of Repair", "date_of_repair", dataObj.date_of_repair, "date")}
        ${createInputField("Customer Name", "customer_name", dataObj.customer_name, "text")}
        ${createInputField("Phone Number", "phone_number", dataObj.phone_number, "text")}
        ${createInputField("Repair Details", "repair_details", dataObj.repair_details, "textarea")}
      `;
    }

    function createInputField(label, id, value, type="text") {

      if(type === "textarea"){
        return `
          <div class="field">
            <div class="field-header">
              <label>${label}</label>
              <span class="edit-icon" onclick="enableField('${id}')">✏️</span>
            </div>
            <textarea id="${id}" disabled>${value || ""}</textarea>
          </div>
        `;
      }

      return `
        <div class="field">
          <div class="field-header">
            <label>${label}</label>
            <span class="edit-icon" onclick="enableField('${id}')">✏️</span>
          </div>
          <input id="${id}" type="${type}" value="${value || ""}" disabled />
        </div>
      `;
    }

    function createSelectField(label, id, value) {
      return `
        <div class="field">
          <div class="field-header">
            <label for="${id}">${label}</label>
            <span class="edit-icon" onclick="enableField('${id}')">✏️</span>
          </div>
          <select id="${id}" disabled>
            <option value="Laptop" ${value === "Laptop" ? "selected" : ""}>Laptop</option>
            <option value="Printer" ${value === "Printer" ? "selected" : ""}>Printer</option>
            <option value="Desktop" ${value === "Desktop" ? "selected" : ""}>Desktop</option>
          </select>
        </div>
      `;
    }

    function enableField(id) {
      const field = document.getElementById(id);
      field.disabled = false;
      field.focus();
    }

    async function updateRecord() {
      const updated = {
        product_type: document.getElementById("product_type").value,
        product_number: document.getElementById("product_number").value,
        model_number: document.getElementById("model_number").value,
        serial_number: document.getElementById("serial_number").value,
        date_of_repair: document.getElementById("date_of_repair").value,
        customer_name: document.getElementById("customer_name").value,
        phone_number: document.getElementById("phone_number").value
        repair_details: document.getElementById("repair_details").value
      };

      const res = await fetch("/update/" + productId, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated)
      });

      if (!res.ok) {
        alert("Failed to update record");
        return;
      }

      alert("Record updated successfully");
      window.location.href = "records.html";
    }

    load();
  </script>
</body>
</html>
