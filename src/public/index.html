<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
:root{
  --bg: #f4f7fb;
  --card: #ffffff;
  --primary: #6366f1;
  --secondary: #22c55e;
  --accent: #0ea5e9;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
}

/* Reset */
*{
  box-sizing: border-box;
}

/* Body */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Top Navbar */
.navbar{
  background: white;
  padding: 15px 25px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  position: sticky;
  top:0;
  z-index:100;
}

.navbar h1{
  font-size:20px;
  margin:0;
}

.navbar button{
  background:#ef4444;
}

/* Container */
.container{
  max-width: 1200px;
  margin:auto;
  padding:20px;
}

/* Stats Cards */
.stats{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat-card{
  background: linear-gradient(135deg, #6366f1, #0ea5e9);
  color:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.stat-card h3{
  margin:0;
  font-size:14px;
  opacity:0.8;
}

.stat-card p{
  font-size:22px;
  margin:5px 0 0;
  font-weight:bold;
}

/* Cards */
.card{
  background: var(--card);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid var(--border);
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* Inputs */
input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#f9fafb;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color: var(--primary);
}

/* Buttons */
button{
  background: var(--primary);
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* Grid */
.row{
  display:grid;
  gap:12px;
}

@media(min-width:768px){
  .row{
    grid-template-columns:1fr 1fr;
  }
}

/* Record Card */
.record-card{
  background:#f8fafc;
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-top:10px;
  transition:0.2s;
}

.record-card:hover{
  transform: translateY(-3px);
}

/* Actions */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

/* Hide dashboard */
#dashboard{
  display:none;
}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h1>Admin Login</h1>

  <label>Username</label>
  <input id="user">

  <label>Password</label>
  <input id="pass" type="password">

  <button onclick="login()">Login</button>
</div>

<div class="navbar">
  <h1>Computers Zone</h1>
  <button onclick="logout()">Logout</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h1>Computers Zone Admin Panel</h1>
    <button onclick="logout()" style="background:red;">Logout</button>
  </div>

  <!-- ADD -->
  <div class="card">
    <h2>Add Product</h2>

    <div class="row">
      <div>
        <label>Product Type</label>
        <select id="type">
          <option value="">Select</option>
          <option>Laptop</option>
          <option>Printer</option>
          <option>Desktop</option>
        </select>
      </div>
    

      <div>
        <label>Product Number</label>
        <input id="pnum">
      </div>

      <div>
        <label>Model Number</label>
        <input id="mnum">
      </div>

      <div>
        <label>Serial Number</label>
        <input id="snum">
      </div>

      <div>
        <label>Date of Repair</label>
        <input type="date" id="date">
      </div>

      <div>
        <label>Customer Name</label>
        <input id="cname">
      </div>

      <div>
        <label>Phone Number</label>
        <input id="phone">
      </div>

      <div>
        <label>Repair Details</label>
        <textarea id="repair" rows="6" style="width:100%;"></textarea>
      </div>
    </div>

    <button onclick="add()">Add Product</button>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <h2>Search</h2>

    <label>Product Type</label>
    <select id="filterType">
      <option value="">All</option>
      <option>Laptop</option>
      <option>Printer</option>
      <option>Desktop</option>
    </select>

    <!-- 🔹 Search By Field -->
    <label>Search By</label>
    <select id="searchField">
      <option value="">Select Field</option>
      <option value="id">Unique ID</option>
      <option value="product_number">Product Number</option>
      <option value="model_number">Model Number</option>
      <option value="serial_number">Serial Number</option>
      <option value="customer_name">Customer Name</option>
      <option value="phone_number">Phone Number</option>
    </select>

    <!-- 🔹 Input -->
    <label>Enter Value</label>
    <input id="searchValue" placeholder="Enter value">

    <label>Date</label>
    <input type="date" id="searchDate">

    <button onclick="search()">Search</button>

    <button onclick="window.location.href='records.html'">
      View All Records
    </button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h2>Results</h2>
    <div id="results"></div>
  </div>

  <div class="stats">
  <div class="stat-card">
    <h3>Total Records</h3>
    <p id="totalCount">0</p>
  </div>
  <div class="stat-card">
    <h3>Laptops</h3>
    <p id="laptopCount">0</p>
  </div>
  <div class="stat-card">
    <h3>Printers</h3>
    <p id="printerCount">0</p>
  </div>
  </div>

</div>
</div>

<script>

// LOGIN
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    localStorage.setItem("isLoggedIn","true");

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Invalid login");
  }
}

window.onload = function(){
  if(localStorage.getItem("isLoggedIn") === "true"){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }
};

// LOGOUT
function logout(){
  localStorage.removeItem("isLoggedIn");
  location.reload();
}

// ADD
async function add(){
  const product = {
    product_type: type.value,
    product_number: pnum.value,
    model_number: mnum.value,
    serial_number: snum.value,
    date_of_repair: date.value,
    customer_name: cname.value,
    phone_number: phone.value,
    repair_details: repair.value
  };

  const res = await fetch("/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(product)
  });

  const data = await res.json();

  if(!res.ok){
    alert("Failed");
    return;
  }

  // 👇 SHOW GENERATED ID
  alert("Added Successfully!\nUnique ID: " + data[0].id);

  // clear fields
  type.value="";
  pnum.value="";
  mnum.value="";
  snum.value="";
  date.value="";
  cname.value="";
  phone.value="";
  repair.value="";
}

// SEARCH
async function search(){
  const field = document.getElementById("searchField").value;
  const value = document.getElementById("searchValue").value.trim().toLowerCase();
  const typeVal = document.getElementById("filterType").value;
  const dateVal = document.getElementById("searchDate").value;

  const res = await fetch("/products");
  const data = await res.json();

  const filtered = data.filter(d => {

    let matchField = true;

    if(field && value){

      const fieldValue = String(d[field] || "").trim().toLowerCase();

      // ✅ Exact match (cleaned)
      if(
        field === "id" ||
        field === "product_number" ||
        field === "model_number" ||
        field === "serial_number"
      ){
        matchField = fieldValue === value;
      }

      // ✅ Partial match (only for name & phone)
      else if(
        field === "customer_name" ||
        field === "phone_number"
      ){
        matchField = fieldValue.includes(value);
      }
    }

    const matchType =
      !typeVal || d.product_type === typeVal;

    const matchDate =
      !dateVal || d.date_of_repair === dateVal;

    return matchField && matchType && matchDate;
  });

  display(filtered);
}

// DISPLAY
function display(data){
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!data.length){
    results.innerHTML = "No data found";
    return;
  }

  data.forEach(d=>{
    results.innerHTML += `
      <div class="record-card">
        <p><b>${d.product_type}</b></p>
        <p><strong>Unique ID:</strong> ${d.id || ""}</p>
        Product: ${d.product_number}<br>
        Model: ${d.model_number}<br>
        Serial: ${d.serial_number}<br>
        Date: ${d.date_of_repair}<br>
        Customer: ${d.customer_name}<br>
        Phone: ${d.phone_number}<br>
        <p><strong>Repair Details:</strong> ${d.repair_details || ""}</p>

        <div class="actions">
          <button onclick="goToEdit(${d.id})">Edit</button>
          <button onclick="deleteRecord(${d.id})" style="background:red;">Delete</button>
        </div>
      </div>
    `;
  });
}
  

// EDIT
function goToEdit(id){
  window.location.href="edit.html?id="+id;
}

// DELETE
async function deleteRecord(id){
  if(!confirm("Delete this record?")) return;

  await fetch("/delete/"+id,{
    method:"DELETE"
  });

  alert("Deleted");
  search();
}

</script>

</body>
</html>
