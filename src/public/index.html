<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #eef3f8;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

h1, h2 {
  color: #1e3a5f;
  margin-top: 0;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #1e3a5f;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #274b79;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.record-card {
  background: #fff;
  padding: 12px;
  border-left: 5px solid #1e3a5f;
  border-radius: 10px;
  margin-top: 10px;
}

#dashboard { display: none; }

.row {
  display: grid;
  gap: 10px;
}

@media(min-width: 768px){
  .row { grid-template-columns: 1fr 1fr; }
}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h1>Admin Login</h1>

  <label>Username</label>
  <input id="user">

  <label>Password</label>
  <input id="pass" type="password">

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h1>Computers Zone Admin Panel</h1>
    <button onclick="logout()" style="background:red;">Logout</button>
  </div>

  <!-- ADD -->
  <div class="card">
    <h2>Add Product</h2>

    <div class="row">
      <div>
        <label>Product Type</label>
        <select id="type">
          <option value="">Select</option>
          <option>Laptop</option>
          <option>Printer</option>
          <option>Desktop</option>
        </select>
      </div>

      <div>
        <label>Brand Name</label>
        <input id="brand" placeholder="Enter brand (HP, Dell, Canon...)">
      </div>
    

      <div>
        <label>Product Number</label>
        <input id="pnum">
      </div>

      <div>
        <label>Model Number</label>
        <input id="mnum">
      </div>

      <div>
        <label>Serial Number</label>
        <input id="snum">
      </div>

      <div>
        <label>Date of Repair</label>
        <input type="date" id="date">
      </div>

      <div>
        <label>Customer Name</label>
        <input id="cname">
      </div>

      <div>
        <label>Phone Number</label>
        <input id="phone">
      </div>

      <div>
        <label>Repair Details</label>
        <textarea id="repair" rows="6" style="width:100%;"></textarea>
      </div>
    </div>

    <button onclick="add()">Add Product</button>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <h2>Search</h2>

    <label>Product Type</label>
    <select id="filterType">
      <option value="">All</option>
      <option>Laptop</option>
      <option>Printer</option>
      <option>Desktop</option>
    </select>

    <label>Brand</label>
    <input id="filterBrand" placeholder="Enter brand">

    <!-- 🔹 Search By Field -->
    <label>Search By</label>
    <select id="searchField">
      <option value="">Select Field</option>
      <option value="id">Unique ID</option>
      <option value="product_number">Product Number</option>
      <option value="model_number">Model Number</option>
      <option value="serial_number">Serial Number</option>
      <option value="customer_name">Customer Name</option>
      <option value="phone_number">Phone Number</option>
    </select>

    <!-- 🔹 Input -->
    <label>Enter Value</label>
    <input id="searchValue" placeholder="Enter value">

    <label>Date</label>
    <input type="date" id="searchDate">

    <button onclick="search()">Search</button>

    <button onclick="window.location.href='records.html'">
      View All Records
    </button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h2>Results</h2>
    <div id="results"></div>
  </div>

</div>
</div>

<script>

// LOGIN
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    localStorage.setItem("isLoggedIn","true");

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Invalid login");
  }
}

window.onload = function(){
  if(localStorage.getItem("isLoggedIn") === "true"){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }
};

// LOGOUT
function logout(){
  localStorage.removeItem("isLoggedIn");
  location.reload();
}

// ADD
async function add(){
  const product = {
    brand: brand.value,
    product_type: type.value,
    product_number: pnum.value,
    model_number: mnum.value,
    serial_number: snum.value,
    date_of_repair: date.value,
    customer_name: cname.value,
    phone_number: phone.value,
    repair_details: repair.value
  };

  const res = await fetch("/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(product)
  });

  const data = await res.json();

  if(!res.ok){
    alert("Failed");
    return;
  }

  // 👇 SHOW GENERATED ID
  alert("Added Successfully!\nUnique ID: " + data[0].id);

  // clear fields
  type.value="";
  brand.value = "";
  pnum.value="";
  mnum.value="";
  snum.value="";
  date.value="";
  cname.value="";
  phone.value="";
  repair.value="";
}

// SEARCH
async function search(){
  const brandVal = document.getElementById("filterBrand").value.toLowerCase();
  const field = document.getElementById("searchField").value;
  const value = document.getElementById("searchValue").value.trim().toLowerCase();
  const typeVal = document.getElementById("filterType").value;
  const dateVal = document.getElementById("searchDate").value;

  const res = await fetch("/products");
  const data = await res.json();

  const filtered = data.filter(d => {

    let matchField = true;

    if(field && value){

      const fieldValue = String(d[field] || "").trim().toLowerCase();

      // ✅ Exact match (cleaned)
      if(
        field === "id" ||
        field === "product_number" ||
        field === "model_number" ||
        field === "serial_number"
      ){
        matchField = fieldValue === value;
      }

      // ✅ Partial match (only for name & phone)
      else if(
        field === "customer_name" ||
        field === "phone_number"
      ){
        matchField = fieldValue.includes(value);
      }
    }

    const matchType =
      !typeVal || d.product_type === typeVal;
    
    const matchBrand =
      !brandVal || String(d.brand || "").toLowerCase().includes(brandVal);

    const matchDate =
      !dateVal || d.date_of_repair === dateVal;

    return matchField && matchType && matchDate && matchBrand;
  });

  display(filtered);
}

// DISPLAY
function display(data){
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!data.length){
    results.innerHTML = "No data found";
    return;
  }

  data.forEach(d=>{
    results.innerHTML += `
      <div class="record-card">
        <p><strong>Brand:</strong> ${d.brand || ""}</p>
        <p><b>${d.product_type}</b></p>
        <p><strong>Unique ID:</strong> ${d.id || ""}</p>
        Product: ${d.product_number}<br>
        Model: ${d.model_number}<br>
        Serial: ${d.serial_number}<br>
        Date: ${d.date_of_repair}<br>
        Customer: ${d.customer_name}<br>
        Phone: ${d.phone_number}<br>
        <p><strong>Repair Details:</strong> ${d.repair_details || ""}</p>

        <div class="actions">
          <button onclick="goToEdit(${d.id})">Edit</button>
          <button onclick="deleteRecord(${d.id})" style="background:red;">Delete</button>
        </div>
      </div>
    `;
  });
}
  

// EDIT
function goToEdit(id){
  window.location.href="edit.html?id="+id;
}

// DELETE
async function deleteRecord(id){
  if(!confirm("Delete this record?")) return;

  await fetch("/delete/"+id,{
    method:"DELETE"
  });

  alert("Deleted");
  search();
}

</script>

</body>
</html>
