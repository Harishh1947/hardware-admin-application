<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h2 { color: #2c3e50; }

input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #2c3e50;
  color: white;
  cursor: pointer;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<h2>Add Product</h2>

<select id="type">
  <option value="">Select Type</option>
  <option>Laptop</option>
  <option>Printer</option>
  <option>Desktop</option>
</select>

<input id="pnum" placeholder="Product Number">
<input id="mnum" placeholder="Model Number">
<input id="snum" placeholder="Serial Number">

<label>Date of Repair</label>
<input type="date" id="date">

<input id="cname" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">

<button onclick="add()">Add Product</button>

<h2>Search</h2>
<input id="searchBox" placeholder="Search anything">
<button onclick="search()">Search</button>

<h2>All Records</h2>
<div id="results"></div>

</div>
</div>

<script>

function login(){
  if(user.value==="admin" && pass.value==="1234"){
    loginPage.style.display="none";
    dashboard.style.display="block";
    loadAll();
  } else {
    alert("Invalid login");
  }
}

// ADD PRODUCT
async function add(){
  await fetch("/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      product_type:type.value,
      product_number:pnum.value,
      model_number:mnum.value,
      serial_number:snum.value,
      date_of_repair:date.value,
      customer_name:cname.value,
      phone_number:phone.value
    })
  });

  alert("Added!");
  loadAll();
}

// LOAD ALL
async function loadAll(){
  let res = await fetch("/products");
  let data = await res.json();
  display(data);
}

// SEARCH
async function search(){
  let val = searchBox.value.toLowerCase();

  let res = await fetch("/products");
  let data = await res.json();

  let filtered = data.filter(d =>
    d.product_type?.toLowerCase().includes(val) ||
    d.product_number?.toLowerCase().includes(val) ||
    d.model_number?.toLowerCase().includes(val) ||
    d.serial_number?.toLowerCase().includes(val) ||
    d.customer_name?.toLowerCase().includes(val) ||
    d.phone_number?.toLowerCase().includes(val) ||
    d.date_of_repair?.includes(val)
  );

  display(filtered);
}

// DISPLAY
function display(data){
  results.innerHTML="";

  data.forEach(d=>{
    results.innerHTML += `
      <div class="card">
        <b>${d.product_type}</b><br>
        Product: ${d.product_number}<br>
        Model: ${d.model_number}<br>
        Serial: ${d.serial_number}<br>
        Date: ${d.date_of_repair || "N/A"}<br>
        Customer: ${d.customer_name}<br>
        Phone: ${d.phone_number}<br>

        <button onclick="editPage(${d.id})">Edit</button>
      </div>
    `;
  });
}

// GO TO EDIT PAGE
function editPage(id){
  window.location.href = "edit.html?id=" + id;
}

</script>

</body>
</html>
