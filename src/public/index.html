<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #eef3f8;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

h1, h2 {
  color: #1e3a5f;
  margin-top: 0;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #1e3a5f;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #274b79;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.record-card {
  background: #fff;
  padding: 12px;
  border-left: 5px solid #1e3a5f;
  border-radius: 10px;
  margin-top: 10px;
}

#dashboard { display: none; }

.row {
  display: grid;
  gap: 10px;
}

@media(min-width: 768px){
  .row { grid-template-columns: 1fr 1fr; }
}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h1>Admin Login</h1>

  <label>Username</label>
  <input id="user">

  <label>Password</label>
  <input id="pass" type="password">

  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h1>Computers Zone Admin Panel</h1>
    <button onclick="logout()" style="background:red;">Logout</button>
  </div>

  <!-- ADD -->
  <div class="card">
    <h2>Add Product</h2>

    <div class="row">
      <div>
        <label>Product Type</label>
        <select id="type">
          <option value="">Select</option>
          <option>Laptop</option>
          <option>Printer</option>
          <option>Desktop</option>
        </select>
      </div>

      <div>
        <label>Product Number</label>
        <input id="pnum">
      </div>

      <div>
        <label>Model Number</label>
        <input id="mnum">
      </div>

      <div>
        <label>Serial Number</label>
        <input id="snum">
      </div>

      <div>
        <label>Date of Repair</label>
        <input type="date" id="date">
      </div>

      <div>
        <label>Customer Name</label>
        <input id="cname">
      </div>

      <div>
        <label>Phone Number</label>
        <input id="phone">
      </div>
    </div>

    <button onclick="add()">Add Product</button>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <h2>Search</h2>

    <label>Product Type</label>
    <select id="filterType">
      <option value="">All</option>
      <option>Laptop</option>
      <option>Printer</option>
      <option>Desktop</option>
    </select>

    <label>Search Text</label>
    <input id="searchBox">

    <label>Date</label>
    <input type="date" id="searchDate">

    <button onclick="search()">Search</button>

    <button onclick="window.location.href='records.html'">
      View All Records
    </button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h2>Results</h2>
    <div id="results"></div>
  </div>

</div>
</div>

<script>

// LOGIN
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    localStorage.setItem("isLoggedIn","true");
    loginPage.style.display="none";
    dashboard.style.display="block";
  } else {
    alert("Invalid login");
  }
}

// AUTO LOGIN
window.onload = function(){
  if(localStorage.getItem("isLoggedIn")==="true"){
    loginPage.style.display="none";
    dashboard.style.display="block";
  }
};

// LOGOUT
function logout(){
  localStorage.removeItem("isLoggedIn");
  location.reload();
}

// ADD
async function add(){
  const product={
    product_type:type.value,
    product_number:pnum.value,
    model_number:mnum.value,
    serial_number:snum.value,
    date_of_repair:date.value,
    customer_name:cname.value,
    phone_number:phone.value
  };

  const res=await fetch("/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(product)
  });

  if(!res.ok){
    alert("Failed");
    return;
  }

  alert("Added!");

  type.value="";
  pnum.value="";
  mnum.value="";
  snum.value="";
  date.value="";
  cname.value="";
  phone.value="";
}

// SEARCH
async function search(){
  const text=searchBox.value.toLowerCase();
  const typeVal=filterType.value;
  const dateVal=searchDate.value;

  const res=await fetch("/products");
  const data=await res.json();

  const filtered=data.filter(d=>
    (typeVal===""||d.product_type===typeVal)&&
    (dateVal===""||d.date_of_repair===dateVal)&&
    (
      d.product_type?.toLowerCase().includes(text)||
      d.product_number?.toLowerCase().includes(text)||
      d.model_number?.toLowerCase().includes(text)||
      d.serial_number?.toLowerCase().includes(text)||
      d.customer_name?.toLowerCase().includes(text)||
      d.phone_number?.toLowerCase().includes(text)
    )
  );

  display(filtered);
}

// DISPLAY
function display(data){
  results.innerHTML="";

  if(!data.length){
    results.innerHTML="No data found";
    return;
  }

  data.forEach(d=>{
    results.innerHTML+=`
      <div class="record-card">
        <p><b>${d.product_type}</b></p>
        Product: ${d.product_number}<br>
        Model: ${d.model_number}<br>
        Serial: ${d.serial_number}<br>
        Date: ${d.date_of_repair}<br>
        Customer: ${d.customer_name}<br>
        Phone: ${d.phone_number}<br>

        <div class="actions">
          <button onclick="goToEdit(${d.id})">Edit</button>
          <button onclick="deleteRecord(${d.id})" style="background:red;">Delete</button>
        </div>
      </div>
    `;
  });
}

// EDIT
function goToEdit(id){
  window.location.href="edit.html?id="+id;
}

// DELETE
async function deleteRecord(id){
  if(!confirm("Delete this record?")) return;

  await fetch("/delete/"+id,{
    method:"DELETE"
  });

  alert("Deleted");
  search();
}

</script>

</body>
</html>
