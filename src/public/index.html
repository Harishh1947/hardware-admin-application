<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

input, select, button {
  padding: 10px;
  margin: 5px;
  width: 100%;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
}

@media (min-width: 600px) {
  input, select {
    width: 48%;
  }
}
</style>
</head>

<body>
<div class="container">

<h2>Add Product</h2>

<select id="type">
  <option>Laptop</option>
  <option>Printer</option>
  <option>Desktop</option>
</select>

<input id="pnum" placeholder="Product Number">
<input id="mnum" placeholder="Model Number">
<input id="snum" placeholder="Serial Number">
<input type="date" id="date">
<input id="cname" placeholder="Customer Name">
<input id="phone" placeholder="Phone">

<button onclick="add()">Add</button>

<h2>Search</h2>
<input id="searchBox" placeholder="Search">
<button onclick="search()">Search</button>

<h2>Results</h2>
<div id="results"></div>

</div>

<script>
async function add() {
  await fetch("/add", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      product_type: type.value,
      product_number: pnum.value,
      model_number: mnum.value,
      serial_number: snum.value,
      date_of_repair: date.value,
      customer_name: cname.value,
      phone_number: phone.value
    })
  });
  alert("Added!");
}

async function search() {
  let val = searchBox.value;
  let res = await fetch("/search/" + val);
  let data = await res.json();

  results.innerHTML = "";

  data.forEach(d => {
    results.innerHTML += `
      <div class="card">
        <b>${d.product_type}</b><br>
        Product: ${d.product_number}<br>
        Model: ${d.model_number}<br>
        Serial: ${d.serial_number}<br>
        Date: ${d.date_of_repair || "N/A"}<br>
        Customer: ${d.customer_name}<br>
        Phone: ${d.phone_number}<br>
        <button onclick="edit(${d.id})">Edit</button>
      </div>
    `;
  });
}

async function edit(id) {
  let name = prompt("New customer name:");
  await fetch("/update/" + id, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ customer_name: name })
  });
  alert("Updated!");
}
</script>

</body>
</html>
