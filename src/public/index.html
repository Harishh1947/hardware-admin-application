<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
:root{
  --bg: #f6f8fc;
  --card: #ffffff;
  --primary: #4f46e5;
  --accent: #06b6d4;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f6f8fc;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.record-card{
  background:#f9fafb;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Add Product</h2>

<select id="type">
<option value="">Select</option>
<option>Laptop</option>
<option>Printer</option>
<option>Desktop</option>
</select>

<input id="pnum" placeholder="Product Number">
<input id="mnum" placeholder="Model Number">
<input id="snum" placeholder="Serial Number">
<input type="date" id="date">
<input id="cname" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<textarea id="repair" placeholder="Repair Details"></textarea>

<button onclick="add()">Add Product</button>
</div>

<div class="card">
<h2>Search</h2>

<select id="searchField">
<option value="custom_id">Unique ID</option>
<option value="product_number">Product Number</option>
<option value="customer_name">Customer Name</option>
</select>

<input id="searchValue" placeholder="Enter value">

<button onclick="search()">Search</button>
<button onclick="window.location.href='records.html'">View All</button>
</div>

<div class="card">
<h2>Results</h2>
<div id="results"></div>
</div>

</div>

<script>
const BASE_URL = "https://computers-zone.onrender.com";

// ADD
async function add(){
  const product = {
    product_type: type.value,
    product_number: pnum.value,
    model_number: mnum.value,
    serial_number: snum.value,
    date_of_repair: date.value,
    customer_name: cname.value,
    phone_number: phone.value,
    repair_details: repair.value
  };

  const res = await fetch(BASE_URL + "/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(product)
  });

  const result = await res.json();

  if(!res.ok){
    alert("Failed");
    return;
  }

  alert("Added Successfully!\nID: " + result.data.custom_id);

  // clear
  type.value="";
  pnum.value="";
  mnum.value="";
  snum.value="";
  date.value="";
  cname.value="";
  phone.value="";
  repair.value="";
}

// SEARCH
async function search(){
  const field = document.getElementById("searchField").value;
  const value = document.getElementById("searchValue").value.toLowerCase();

  const res = await fetch(BASE_URL + "/products");
  const data = await res.json();

  const filtered = data.filter(d=>{
    const val = String(d[field] || "").toLowerCase();

    if(field === "custom_id"){
      return val === value;
    } else {
      return val.includes(value);
    }
  });

  display(filtered);
}

// DISPLAY
function display(data){
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!data.length){
    results.innerHTML = "No data found";
    return;
  }

  data.forEach(d=>{
    results.innerHTML += `
      <div class="record-card">
        <p><b>${d.product_type}</b></p>
        <p><strong>ID:</strong> ${d.custom_id}</p>
        <p>${d.product_number}</p>
        <p>${d.customer_name}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
