<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Admin Panel</title>

<style>
:root{
  --bg: #f6f8fc;
  --card: #ffffff;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --accent: #06b6d4;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',system-ui,sans-serif;
  background: radial-gradient(circle at top, #eef2ff, #f8fafc);
}
.container{max-width:1150px;margin:auto;padding:25px;}
.card{
  background:var(--card);
  border-radius:18px;
  padding:22px;
  margin-bottom:20px;
  border:1px solid var(--border);
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}
h1{font-size:26px;}
h2{font-size:20px;color:var(--muted);}
input,select,textarea{
  width:100%;
  padding:11px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
}
button{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;
  border:none;
  padding:11px;
  border-radius:10px;
  cursor:pointer;
}
.record-card{
  background:#f9fafb;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Add Product</h1>

<select id="type">
<option value="">Select</option>
<option>Laptop</option>
<option>Printer</option>
<option>Desktop</option>
</select>

<input id="pnum" placeholder="Product Number">
<input id="mnum" placeholder="Model Number">
<input id="snum" placeholder="Serial Number">
<input type="date" id="date">
<input id="cname" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<textarea id="repair"></textarea>

<button onclick="add()">Add Product</button>
</div>

<div class="card">
<h2>Search</h2>

<select id="searchField">
<option value="custom_id">Unique ID</option> <!-- ✅ FIXED -->
<option value="product_number">Product Number</option>
<option value="model_number">Model Number</option>
<option value="serial_number">Serial Number</option>
<option value="customer_name">Customer Name</option>
<option value="phone_number">Phone Number</option>
</select>

<input id="searchValue" placeholder="Enter value">

<button onclick="search()">Search</button>
<button onclick="window.location.href='records.html'">View All Records</button>
</div>

<div class="card">
<h2>Results</h2>
<div id="results"></div>
</div>

</div>

<script>
const BASE_URL = "https://computers-zone.onrender.com";

// ADD
async function add(){
  const product = {
    product_type: type.value,
    product_number: pnum.value,
    model_number: mnum.value,
    serial_number: snum.value,
    date_of_repair: date.value,
    customer_name: cname.value,
    phone_number: phone.value,
    repair_details: repair.value
  };

  const res = await fetch(BASE_URL + "/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(product)
  });

  const data = await res.json();

  if(!res.ok){
    alert("Failed");
    return;
  }

  // ✅ FIXED (custom_id instead of id)
  alert("Added Successfully!\nUnique ID: " + data[0].custom_id);

  // clear fields
  type.value="";
  pnum.value="";
  mnum.value="";
  snum.value="";
  date.value="";
  cname.value="";
  phone.value="";
  repair.value="";
}

// SEARCH
async function search(){
  const field = document.getElementById("searchField").value;
  const value = document.getElementById("searchValue").value.trim().toLowerCase();

  const res = await fetch(BASE_URL + "/products");
  const data = await res.json();

  const filtered = data.filter(d=>{
    const fieldValue = String(d[field] || "").toLowerCase();

    // ✅ exact match for custom_id
    if(field === "custom_id"){
      return fieldValue === value;
    }

    // partial match for others
    return fieldValue.includes(value);
  });

  display(filtered);
}

// DISPLAY
function display(data){
  const results = document.getElementById("results");
  results.innerHTML="";

  if(!data.length){
    results.innerHTML="No data found";
    return;
  }

  data.forEach(d=>{
    results.innerHTML+=`
      <div class="record-card">
        <p><b>${d.product_type}</b></p>
        <p><strong>Unique ID:</strong> ${d.custom_id}</p> <!-- ✅ FIXED -->
        <p>Product: ${d.product_number}</p>
        <p>Customer: ${d.customer_name}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
