<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Records</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3f8;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    h1 {
      color: #1e3a5f;
      margin-top: 0;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1e3a5f;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #274b79;
    }

    .top-actions {
      margin-bottom: 18px;
    }

    .record p {
      margin: 6px 0;
    }

    .edit-btn {
      margin-top: 10px;
    }

    .delete-btn {
      background: red;
      margin-left: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-actions">
    <button onclick="window.location.href='index.html'">
      Back to Dashboard
    </button>
  </div>

  <div class="card">
    <h1>All Records</h1>
    <div id="results"></div>
  </div>

</div>

<script>
const BASE_URL = "https://computers-zone.onrender.com";

// LOAD ALL RECORDS
async function loadRecords() {
  try {
    const results = document.getElementById("results");

    const res = await fetch(BASE_URL + "/products");
    const data = await res.json();

    results.innerHTML = "";

    if (!data.length) {
      results.innerHTML = "<p>No records found.</p>";
      return;
    }

    data.forEach((d) => {
      results.innerHTML += `
        <div class="card record">
          <p><strong>Unique ID:</strong> ${d.custom_id || ""}</p>
          <p><strong>Product Type:</strong> ${d.product_type || ""}</p>
          <p><strong>Product Number:</strong> ${d.product_number || ""}</p>
          <p><strong>Model Number:</strong> ${d.model_number || ""}</p>
          <p><strong>Serial Number:</strong> ${d.serial_number || ""}</p>
          <p><strong>Date of Repair:</strong> ${d.date_of_repair || ""}</p>
          <p><strong>Customer Name:</strong> ${d.customer_name || ""}</p>
          <p><strong>Phone Number:</strong> ${d.phone_number || ""}</p>

          <button class="edit-btn" onclick="goToEdit(${d.id})">
            Edit
          </button>

          <button class="delete-btn" onclick="deleteRecord(${d.id})">
            Delete
          </button>
        </div>
      `;
    });

  } catch (err) {
    console.log("LOAD ERROR:", err);
    document.getElementById("results").innerHTML = "Error loading records";
  }
}

// GO TO EDIT PAGE
function goToEdit(id) {
  window.location.href = "edit.html?id=" + id;
}

// DELETE RECORD
async function deleteRecord(id) {
  if (!confirm("Delete this record?")) return;

  try {
    const res = await fetch(BASE_URL + "/delete/" + id, {
      method: "DELETE"
    });

    if (!res.ok) {
      alert("Delete failed");
      return;
    }

    alert("Deleted successfully");
    loadRecords();

  } catch (err) {
    console.log("DELETE ERROR:", err);
    alert("Error deleting record");
  }
}

// INITIAL LOAD
loadRecords();
</script>

</body>
</html>
